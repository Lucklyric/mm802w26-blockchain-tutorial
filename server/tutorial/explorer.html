<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chain Explorer — CMPUT 802</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ===== EXPLORER-SPECIFIC STYLES ===== */

    :root {
      --ex-bg-deep: #0a0e14;
      --ex-bg-panel: #111820;
      --ex-bg-card: #161d27;
      --ex-bg-hover: #1c2530;
      --ex-border: #1e2a38;
      --ex-border-active: #2a3a4e;
      --ex-text-primary: #e2e8f0;
      --ex-text-secondary: #8899aa;
      --ex-text-dim: #556677;
      --ex-accent: #00e59b;
      --ex-accent-glow: rgba(0, 229, 155, 0.15);
      --ex-accent-dim: #00b378;
      --ex-amber: #f0b429;
      --ex-amber-glow: rgba(240, 180, 41, 0.12);
      --ex-red: #ff6b6b;
      --ex-blue: #64b5f6;
      --ex-mono: 'IBM Plex Mono', 'Fira Code', 'Cascadia Code', monospace;
      --ex-sans: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      --ex-radius: 8px;
      --ex-radius-lg: 12px;
      --ex-shadow: 0 2px 12px rgba(0, 0, 0, 0.3);
      --ex-shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.4);
      --ex-transition: 0.2s ease;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--ex-sans);
      background: var(--ex-bg-deep);
      color: var(--ex-text-primary);
      line-height: 1.6;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* scanline texture overlay */
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      z-index: 9999;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0, 0, 0, 0.03) 2px,
        rgba(0, 0, 0, 0.03) 4px
      );
    }

    /* ===== HEADER ===== */
    .ex-header {
      background: var(--ex-bg-panel);
      border-bottom: 1px solid var(--ex-border);
      padding: 0 32px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(12px);
    }

    .ex-header-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .ex-logo {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, var(--ex-accent), var(--ex-accent-dim));
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--ex-mono);
      font-weight: 700;
      font-size: 14px;
      color: var(--ex-bg-deep);
      flex-shrink: 0;
    }

    .ex-header h1 {
      font-family: var(--ex-mono);
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--ex-text-primary);
    }

    .ex-header h1 span {
      color: var(--ex-text-dim);
      font-weight: 400;
    }

    .ex-header-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .ex-back-link {
      font-family: var(--ex-mono);
      font-size: 13px;
      color: var(--ex-text-secondary);
      text-decoration: none;
      padding: 6px 12px;
      border: 1px solid var(--ex-border);
      border-radius: var(--ex-radius);
      transition: all var(--ex-transition);
    }

    .ex-back-link:hover {
      color: var(--ex-accent);
      border-color: var(--ex-accent);
      background: var(--ex-accent-glow);
    }

    .ex-refresh-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .ex-timestamp {
      font-family: var(--ex-mono);
      font-size: 11px;
      color: var(--ex-text-dim);
    }

    .ex-toggle {
      position: relative;
      width: 40px;
      height: 22px;
      cursor: pointer;
    }

    .ex-toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .ex-toggle-track {
      position: absolute;
      inset: 0;
      background: var(--ex-border);
      border-radius: 11px;
      transition: background var(--ex-transition);
    }

    .ex-toggle-track::after {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      background: var(--ex-text-secondary);
      border-radius: 50%;
      top: 3px;
      left: 3px;
      transition: all var(--ex-transition);
    }

    .ex-toggle input:checked + .ex-toggle-track {
      background: var(--ex-accent-dim);
    }

    .ex-toggle input:checked + .ex-toggle-track::after {
      transform: translateX(18px);
      background: var(--ex-accent);
    }

    .ex-auto-label {
      font-family: var(--ex-mono);
      font-size: 11px;
      color: var(--ex-text-dim);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* ===== MAIN LAYOUT ===== */
    .ex-main {
      max-width: 1280px;
      margin: 0 auto;
      padding: 28px 32px 64px;
    }

    /* ===== STATUS CARDS ===== */
    .ex-stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 28px;
    }

    .ex-stat-card {
      background: var(--ex-bg-card);
      border: 1px solid var(--ex-border);
      border-radius: var(--ex-radius-lg);
      padding: 20px 22px;
      transition: all var(--ex-transition);
      position: relative;
      overflow: hidden;
    }

    .ex-stat-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: var(--ex-accent);
      opacity: 0;
      transition: opacity var(--ex-transition);
    }

    .ex-stat-card:hover {
      border-color: var(--ex-border-active);
      transform: translateY(-1px);
      box-shadow: var(--ex-shadow);
    }

    .ex-stat-card:hover::before {
      opacity: 1;
    }

    .ex-stat-label {
      font-family: var(--ex-mono);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--ex-text-dim);
      margin-bottom: 8px;
    }

    .ex-stat-value {
      font-family: var(--ex-mono);
      font-size: 28px;
      font-weight: 700;
      color: var(--ex-text-primary);
      line-height: 1.2;
    }

    .ex-stat-value.hash-value {
      font-size: 13px;
      font-weight: 500;
      color: var(--ex-accent);
      word-break: break-all;
      cursor: pointer;
    }

    .ex-stat-value.hash-value:hover {
      text-decoration: underline;
      text-decoration-style: dotted;
    }

    .ex-stat-icon {
      position: absolute;
      top: 16px;
      right: 18px;
      font-size: 20px;
      opacity: 0.15;
    }

    /* ===== SECTION HEADERS ===== */
    .ex-section {
      margin-bottom: 28px;
    }

    .ex-section-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--ex-border);
    }

    .ex-section-title {
      font-family: var(--ex-mono);
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--ex-text-secondary);
    }

    .ex-section-badge {
      font-family: var(--ex-mono);
      font-size: 11px;
      background: var(--ex-accent-glow);
      color: var(--ex-accent);
      padding: 2px 8px;
      border-radius: 4px;
      border: 1px solid rgba(0, 229, 155, 0.2);
    }

    /* ===== CHAIN VISUALIZATION ===== */
    .ex-chain-strip {
      overflow-x: auto;
      padding: 12px 0 20px;
      scrollbar-width: thin;
      scrollbar-color: var(--ex-border) transparent;
    }

    .ex-chain-strip::-webkit-scrollbar {
      height: 6px;
    }

    .ex-chain-strip::-webkit-scrollbar-track {
      background: transparent;
    }

    .ex-chain-strip::-webkit-scrollbar-thumb {
      background: var(--ex-border);
      border-radius: 3px;
    }

    .ex-chain-inner {
      display: flex;
      align-items: center;
      gap: 0;
      min-width: min-content;
    }

    .ex-block-card {
      flex-shrink: 0;
      width: 160px;
      background: var(--ex-bg-card);
      border: 1px solid var(--ex-border);
      border-radius: var(--ex-radius);
      padding: 14px 16px;
      cursor: pointer;
      transition: all var(--ex-transition);
      position: relative;
    }

    .ex-block-card:hover {
      border-color: var(--ex-accent);
      background: var(--ex-bg-hover);
      box-shadow: 0 0 20px var(--ex-accent-glow);
      transform: translateY(-2px);
    }

    .ex-block-card.active {
      border-color: var(--ex-accent);
      box-shadow: 0 0 20px var(--ex-accent-glow);
    }

    .ex-block-card.genesis {
      border-color: var(--ex-amber);
      background: linear-gradient(135deg, var(--ex-bg-card), rgba(240, 180, 41, 0.06));
    }

    .ex-block-card.genesis:hover {
      box-shadow: 0 0 20px var(--ex-amber-glow);
    }

    .ex-block-card.genesis .ex-block-num {
      color: var(--ex-amber);
    }

    .ex-block-num {
      font-family: var(--ex-mono);
      font-size: 13px;
      font-weight: 700;
      color: var(--ex-accent);
      margin-bottom: 4px;
    }

    .ex-block-miner {
      font-family: var(--ex-mono);
      font-size: 11px;
      color: var(--ex-text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 6px;
    }

    .ex-block-hash {
      font-family: var(--ex-mono);
      font-size: 10px;
      color: var(--ex-text-dim);
      letter-spacing: 0.02em;
    }

    .ex-chain-link {
      flex-shrink: 0;
      width: 36px;
      height: 2px;
      background: var(--ex-border);
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .ex-chain-link::after {
      content: '';
      position: absolute;
      right: -3px;
      width: 6px;
      height: 6px;
      border-top: 2px solid var(--ex-text-dim);
      border-right: 2px solid var(--ex-text-dim);
      transform: rotate(45deg);
    }

    .ex-chain-link-dot {
      width: 4px;
      height: 4px;
      background: var(--ex-accent);
      border-radius: 50%;
      box-shadow: 0 0 6px var(--ex-accent);
    }

    .ex-chain-empty {
      font-family: var(--ex-mono);
      font-size: 13px;
      color: var(--ex-text-dim);
      padding: 32px 0;
      text-align: center;
    }

    /* ===== TWO-COLUMN LAYOUT ===== */
    .ex-two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      align-items: start;
    }

    /* ===== BLOCK VIEWER ===== */
    .ex-viewer-nav {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
    }

    .ex-nav-btn {
      font-family: var(--ex-mono);
      font-size: 13px;
      background: var(--ex-bg-card);
      color: var(--ex-text-secondary);
      border: 1px solid var(--ex-border);
      border-radius: var(--ex-radius);
      padding: 6px 14px;
      cursor: pointer;
      transition: all var(--ex-transition);
    }

    .ex-nav-btn:hover:not(:disabled) {
      border-color: var(--ex-accent);
      color: var(--ex-accent);
      background: var(--ex-accent-glow);
    }

    .ex-nav-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .ex-nav-input {
      font-family: var(--ex-mono);
      font-size: 13px;
      width: 72px;
      text-align: center;
      background: var(--ex-bg-deep);
      color: var(--ex-text-primary);
      border: 1px solid var(--ex-border);
      border-radius: var(--ex-radius);
      padding: 6px 8px;
      outline: none;
      transition: border-color var(--ex-transition);
    }

    .ex-nav-input:focus {
      border-color: var(--ex-accent);
    }

    .ex-nav-of {
      font-family: var(--ex-mono);
      font-size: 12px;
      color: var(--ex-text-dim);
    }

    .ex-block-detail {
      background: var(--ex-bg-card);
      border: 1px solid var(--ex-border);
      border-radius: var(--ex-radius-lg);
      overflow: hidden;
    }

    .ex-detail-row {
      display: flex;
      border-bottom: 1px solid var(--ex-border);
      transition: background var(--ex-transition);
    }

    .ex-detail-row:last-child {
      border-bottom: none;
    }

    .ex-detail-row:hover {
      background: var(--ex-bg-hover);
    }

    .ex-detail-key {
      font-family: var(--ex-mono);
      font-size: 12px;
      color: var(--ex-text-dim);
      padding: 10px 16px;
      width: 150px;
      flex-shrink: 0;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      border-right: 1px solid var(--ex-border);
      display: flex;
      align-items: center;
    }

    .ex-detail-val {
      font-family: var(--ex-mono);
      font-size: 13px;
      color: var(--ex-text-primary);
      padding: 10px 16px;
      flex: 1;
      min-width: 0;
      word-break: break-all;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .ex-detail-val.accent { color: var(--ex-accent); }
    .ex-detail-val.amber { color: var(--ex-amber); }

    .ex-detail-section-header {
      background: rgba(0, 229, 155, 0.04);
      border-bottom: 1px solid var(--ex-border);
      padding: 8px 16px;
      font-family: var(--ex-mono);
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--ex-accent);
    }

    .ex-copy-btn {
      flex-shrink: 0;
      width: 26px;
      height: 26px;
      background: none;
      border: 1px solid var(--ex-border);
      border-radius: 4px;
      color: var(--ex-text-dim);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      transition: all var(--ex-transition);
    }

    .ex-copy-btn:hover {
      border-color: var(--ex-accent);
      color: var(--ex-accent);
    }

    .ex-copy-btn.copied {
      border-color: var(--ex-accent);
      color: var(--ex-accent);
      background: var(--ex-accent-glow);
    }

    .ex-truncate {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
      min-width: 0;
    }

    /* ===== LEDGER TABLE ===== */
    .ex-table-wrap {
      background: var(--ex-bg-card);
      border: 1px solid var(--ex-border);
      border-radius: var(--ex-radius-lg);
      overflow: hidden;
    }

    .ex-table {
      width: 100%;
      border-collapse: collapse;
    }

    .ex-table thead th {
      font-family: var(--ex-mono);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--ex-text-dim);
      padding: 12px 16px;
      text-align: left;
      background: var(--ex-bg-panel);
      border-bottom: 1px solid var(--ex-border);
      position: sticky;
      top: 0;
    }

    .ex-table tbody td {
      font-family: var(--ex-mono);
      font-size: 13px;
      padding: 10px 16px;
      border-bottom: 1px solid var(--ex-border);
      color: var(--ex-text-primary);
    }

    .ex-table tbody tr:last-child td {
      border-bottom: none;
    }

    .ex-table tbody tr {
      transition: background var(--ex-transition);
    }

    .ex-table tbody tr:hover {
      background: var(--ex-bg-hover);
    }

    .ex-badge {
      font-family: var(--ex-mono);
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 4px;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      letter-spacing: 0.02em;
    }

    .ex-badge-complete {
      background: rgba(0, 229, 155, 0.1);
      color: var(--ex-accent);
      border: 1px solid rgba(0, 229, 155, 0.2);
    }

    .ex-badge-pending {
      background: rgba(136, 153, 170, 0.1);
      color: var(--ex-text-dim);
      border: 1px solid rgba(136, 153, 170, 0.15);
    }

    .ex-badge-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }

    .ex-badge-complete .ex-badge-dot {
      background: var(--ex-accent);
      box-shadow: 0 0 4px var(--ex-accent);
    }

    .ex-badge-pending .ex-badge-dot {
      background: var(--ex-text-dim);
    }

    .ex-table-empty {
      text-align: center;
      padding: 40px 16px;
      font-family: var(--ex-mono);
      font-size: 13px;
      color: var(--ex-text-dim);
    }

    .ex-table-scroll {
      max-height: 420px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--ex-border) transparent;
    }

    .ex-table-scroll::-webkit-scrollbar {
      width: 5px;
    }

    .ex-table-scroll::-webkit-scrollbar-track {
      background: transparent;
    }

    .ex-table-scroll::-webkit-scrollbar-thumb {
      background: var(--ex-border);
      border-radius: 3px;
    }

    /* ===== LOADING / ERROR ===== */
    .ex-loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px;
      gap: 12px;
      font-family: var(--ex-mono);
      font-size: 13px;
      color: var(--ex-text-dim);
    }

    .ex-spinner {
      width: 18px;
      height: 18px;
      border: 2px solid var(--ex-border);
      border-top-color: var(--ex-accent);
      border-radius: 50%;
      animation: ex-spin 0.8s linear infinite;
    }

    @keyframes ex-spin {
      to { transform: rotate(360deg); }
    }

    .ex-error {
      background: rgba(255, 107, 107, 0.08);
      border: 1px solid rgba(255, 107, 107, 0.2);
      border-radius: var(--ex-radius);
      padding: 16px 20px;
      font-family: var(--ex-mono);
      font-size: 13px;
      color: var(--ex-red);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .ex-error-icon {
      flex-shrink: 0;
      font-size: 16px;
    }

    /* ===== FADE-IN ANIMATION ===== */
    @keyframes ex-fade-up {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .ex-animate {
      animation: ex-fade-up 0.4s ease forwards;
      opacity: 0;
    }

    .ex-delay-1 { animation-delay: 0.05s; }
    .ex-delay-2 { animation-delay: 0.10s; }
    .ex-delay-3 { animation-delay: 0.15s; }
    .ex-delay-4 { animation-delay: 0.20s; }
    .ex-delay-5 { animation-delay: 0.25s; }
    .ex-delay-6 { animation-delay: 0.30s; }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 1024px) {
      .ex-two-col {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 768px) {
      .ex-stats {
        grid-template-columns: repeat(2, 1fr);
      }
      .ex-header {
        padding: 0 16px;
        height: 56px;
      }
      .ex-header h1 {
        font-size: 14px;
      }
      .ex-main {
        padding: 20px 16px 48px;
      }
      .ex-detail-key {
        width: 110px;
        font-size: 10px;
      }
    }

    @media (max-width: 480px) {
      .ex-stats {
        grid-template-columns: 1fr;
      }
      .ex-header-right .ex-timestamp {
        display: none;
      }
    }

    /* ===== TOOLTIP ===== */
    .ex-tooltip {
      position: relative;
    }

    .ex-tooltip::after {
      content: attr(data-tooltip);
      position: absolute;
      bottom: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%);
      background: var(--ex-bg-panel);
      border: 1px solid var(--ex-border);
      color: var(--ex-text-primary);
      font-family: var(--ex-mono);
      font-size: 11px;
      padding: 6px 10px;
      border-radius: 6px;
      white-space: nowrap;
      max-width: 400px;
      overflow: hidden;
      text-overflow: ellipsis;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s ease;
      box-shadow: var(--ex-shadow-lg);
      z-index: 50;
    }

    .ex-tooltip:hover::after {
      opacity: 1;
    }

    /* ===== PULSE DOT ===== */
    .ex-pulse {
      width: 8px;
      height: 8px;
      background: var(--ex-accent);
      border-radius: 50%;
      display: inline-block;
      position: relative;
    }

    .ex-pulse::after {
      content: '';
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      border: 1px solid var(--ex-accent);
      animation: ex-pulse-ring 2s ease infinite;
    }

    @keyframes ex-pulse-ring {
      0% { transform: scale(1); opacity: 0.6; }
      100% { transform: scale(2); opacity: 0; }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header class="ex-header">
    <div class="ex-header-left">
      <div class="ex-logo">#</div>
      <h1>Chain Explorer <span>— CMPUT 802</span></h1>
    </div>
    <div class="ex-header-right">
      <span class="ex-timestamp" id="lastUpdated"></span>
      <label class="ex-auto-label" for="autoRefreshToggle">Auto</label>
      <label class="ex-toggle">
        <input type="checkbox" id="autoRefreshToggle">
        <div class="ex-toggle-track"></div>
      </label>
      <a href="index.html" class="ex-back-link">&larr; Tutorial</a>
    </div>
  </header>

  <!-- MAIN -->
  <main class="ex-main">

    <!-- STATUS CARDS -->
    <section class="ex-stats" id="statsSection">
      <div class="ex-stat-card ex-animate ex-delay-1">
        <div class="ex-stat-icon">&#9646;&#9646;&#9646;</div>
        <div class="ex-stat-label">Chain Length</div>
        <div class="ex-stat-value" id="statChainLength">--</div>
      </div>
      <div class="ex-stat-card ex-animate ex-delay-2">
        <div class="ex-stat-icon">&#9881;</div>
        <div class="ex-stat-label">Difficulty</div>
        <div class="ex-stat-value" id="statDifficulty">--</div>
      </div>
      <div class="ex-stat-card ex-animate ex-delay-3">
        <div class="ex-stat-icon">&#10006;</div>
        <div class="ex-stat-label">Target Prefix</div>
        <div class="ex-stat-value" id="statTargetPrefix">--</div>
      </div>
      <div class="ex-stat-card ex-animate ex-delay-4">
        <div class="ex-stat-icon">&#x26D3;</div>
        <div class="ex-stat-label">Latest Hash</div>
        <div class="ex-stat-value hash-value ex-tooltip" id="statLatestHash" data-tooltip="">--</div>
      </div>
    </section>

    <!-- CHAIN VISUALIZATION -->
    <section class="ex-section ex-animate ex-delay-5">
      <div class="ex-section-header">
        <span class="ex-section-title">Chain Visualization</span>
        <span class="ex-section-badge" id="chainBadge">0 blocks</span>
      </div>
      <div class="ex-chain-strip" id="chainStrip">
        <div class="ex-chain-inner" id="chainInner">
          <div class="ex-chain-empty">Loading chain data...</div>
        </div>
      </div>
    </section>

    <!-- TWO-COL: BLOCK VIEWER + LEDGER -->
    <div class="ex-two-col ex-animate ex-delay-6">

      <!-- BLOCK VIEWER -->
      <section class="ex-section">
        <div class="ex-section-header">
          <span class="ex-section-title">Block Viewer</span>
        </div>
        <div class="ex-viewer-nav">
          <button class="ex-nav-btn" id="btnPrev" disabled>&laquo; Prev</button>
          <input type="number" class="ex-nav-input" id="blockIndexInput" min="0" value="0">
          <span class="ex-nav-of" id="blockTotal">/ 0</span>
          <button class="ex-nav-btn" id="btnNext">Next &raquo;</button>
        </div>
        <div id="blockViewer">
          <div class="ex-loading"><div class="ex-spinner"></div> Loading block...</div>
        </div>
      </section>

      <!-- LEDGER TABLE -->
      <section class="ex-section">
        <div class="ex-section-header">
          <span class="ex-section-title">Student Ledger</span>
          <span class="ex-section-badge" id="ledgerBadge">0 students</span>
        </div>
        <div class="ex-table-wrap">
          <div class="ex-table-scroll" id="ledgerTableWrap">
            <table class="ex-table">
              <thead>
                <tr>
                  <th>Email</th>
                  <th>Status</th>
                  <th>Block #</th>
                </tr>
              </thead>
              <tbody id="ledgerBody">
                <tr><td class="ex-table-empty" colspan="3">Loading ledger...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </section>

    </div>
  </main>

  <script src="js/explorer.js"></script>
</body>
</html>
